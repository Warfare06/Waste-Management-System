<!DOCTYPE html>
<html>
<head>
    <title>Smart Street Waste Monitoring</title>
    <link rel="stylesheet" href="style.css">

    <!-- Leaflet Map -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
</head>
<body>

<h1>SMART STREET WASTE MONITORING</h1>

<div class="streets">
    <button onclick="selectStreet(1)">Street 1</button>
    <button onclick="selectStreet(2)">Street 2</button>
    <button onclick="selectStreet(3)">Street 3</button>
    <button onclick="selectStreet(4)">Street 4</button>
</div>

<h2 id="streetTitle">Street 1</h2>

<!-- BINS -->
<div class="bins-container">

    <div class="bin-card red">
        <h3>Bin 1</h3>
        <div class="bin"><div class="fill" id="fill1"></div></div>
        <p id="level1">0%</p>
    </div>

    <div class="bin-card green">
        <h3>Bin 2</h3>
        <div class="bin"><div class="fill" id="fill2"></div></div>
        <p id="level2">0%</p>
    </div>

    <div class="bin-card blue">
        <h3>Bin 3</h3>
        <div class="bin"><div class="fill" id="fill3"></div></div>
        <p id="level3">0%</p>
    </div>

    <div class="bin-card yellow">
        <h3>Bin 4</h3>
        <div class="bin"><div class="fill" id="fill4"></div></div>
        <p id="level4">0%</p>
    </div>

</div>

<!-- GRAPH -->
<h2>Street Load History</h2>
<canvas id="wasteChart"></canvas>

<!-- DASHBOARD -->
<div class="dashboard">
    <div class="card prediction">
        Prediction
        <p id="prediction">0%</p>
    </div>

    <div class="card avg">
        Average Load
        <p id="avg">0%</p>
    </div>

    <div class="card full">
        Full Bins
        <p id="full">0</p>
    </div>
</div>

<!-- MAP -->
<h2>Garbage Truck Route</h2>
<div id="map"></div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="script.js"></script>

</body>
</html>
